name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9000:9000

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create S3 buckets
      run: |
        apt-get update && apt-get install -y mc
        mc alias set minio http://localhost:9000 minioadmin minioadmin
        mc mb minio/glashaus-blocks --ignore-existing
        mc mb minio/glashaus-data --ignore-existing

    - name: Check TypeScript compilation
      run: npx tsc --noEmit

    - name: Run tests
      run: npm test
      env:
        S3_ENDPOINT: http://localhost:9000
        S3_BLOCKSTORE_BUCKET: glashaus-blocks
        S3_DATASTORE_BUCKET: glashaus-data
        S3_REGION: us-east-1
        AWS_ACCESS_KEY_ID: minioadmin
        AWS_SECRET_ACCESS_KEY: minioadmin
        NODE_INTERNAL_PORT: 4000
        LOG_LEVEL: info

    - name: Check code vulnerabilities
      run: npm audit --production
      continue-on-error: true
